services:
  - type: web
    name: f1-strategy-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false

databases:
  - name: f1-postgres
    databaseName: f1_strategy
    user: postgres
    plan: free